version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: patients_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  healthcare-api:
    build:
      context: .
      dockerfile: HealthCare/Dockerfile
    container_name: healthcare-api
    depends_on:
      postgres:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=patients_db;Username=postgres;Password=1
    ports:
      - "5000:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  patients-seed:
    build:
      context: .
      dockerfile: PatientsSeed/Dockerfile
    container_name: patients-seed
    depends_on:
      healthcare-api:
        condition: service_healthy
    environment:
      ApiSettings__BaseUrl: http://healthcare-api:8080
    restart: "no"

volumes:
  postgres_data: